<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RC DRAG SERVICE - Taller Mecánico</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Barlow:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #E10600;
      --secondary: #FFD700;
      --accent: #0066CC;
      --dark: #111111;
      --dark2: #1a1a1a;
      --dark3: #222222;
      --light: #f0f0f0;
      --gray: #888;
      --border: rgba(255,255,255,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Barlow', sans-serif;
      background-color: var(--dark);
      color: var(--light);
      line-height: 1.7;
      overflow-x: hidden;
    }

    h1, h2, h3, h4, nav {
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 0.03em;
    }

    a { text-decoration: none; color: inherit; }

    /* ===== NAVBAR ===== */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: #0d0d0d;
      border-bottom: 2px solid var(--primary);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 64px;
    }

    .navbar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .navbar-logo .logo-circle {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      overflow: hidden;
    }

    .navbar-logo .logo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .navbar-logo span {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: white;
      text-transform: uppercase;
    }

    .navbar-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .navbar-links a {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #ccc;
      transition: color 0.2s;
    }

    .navbar-links a:hover { color: var(--secondary); }

    .navbar-cta {
      background: var(--primary);
      color: white !important;
      padding: 8px 20px;
      border-radius: 4px;
      font-weight: 700 !important;
      transition: background 0.2s !important;
    }

    .navbar-cta:hover { background: #b30500 !important; color: white !important; }

    .btn {
      display: inline-block;
      background: var(--primary);
      color: white;
      padding: 12px 32px;
      border-radius: 4px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.25s ease;
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      background: #b30500;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(225,6,0,0.4);
    }

    /* ===== SECCIONES GENERALES ===== */
    .section {
      padding: 0;
      border-bottom: 1px solid var(--border);
    }

    .section-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 320px;
    }

    .section-row.reverse { direction: rtl; }
    .section-row.reverse > * { direction: ltr; }

    .section-text {
      padding: 3.5rem 3rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: var(--dark2);
    }

    .section-image {
      background: var(--dark3);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      position: relative;
    }

    .section-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.85;
      transition: opacity 0.3s, transform 0.5s;
    }

    .section-image:hover img { opacity: 1; transform: scale(1.04); }
    .section-image .placeholder { font-size: 5rem; opacity: 0.2; }

    .section-label {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--primary);
      font-weight: 600;
      margin-bottom: 0.6rem;
    }

    .section-text h2 {
      font-size: 1.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: white;
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    .section-text p {
      font-size: 1rem;
      color: #bbb;
      font-style: italic;
      line-height: 1.75;
    }

    /* ===== SERVICIOS ===== */
    .servicios-section {
      background: var(--dark3);
      padding: 3.5rem 0;
      border-bottom: 1px solid var(--border);
    }

    .servicios-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .servicios-col-image {
      background: var(--dark2);
      min-height: 360px;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .servicios-col-image img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
    .servicios-col-image .placeholder { font-size: 6rem; opacity: 0.15; }

    .servicios-col-text {
      padding: 3rem;
      background: var(--dark2);
      border-left: 1px solid var(--border);
    }

    .servicios-col-text h3 {
      font-size: 1.5rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--secondary);
      margin-bottom: 1.8rem;
    }

    .servicio-item {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
      margin-bottom: 1.2rem;
      font-style: italic;
      color: #ccc;
      font-size: 1rem;
    }

    .servicio-item::before {
      content: '•';
      color: var(--primary);
      font-size: 1.4rem;
      line-height: 1.3;
      flex-shrink: 0;
    }

    /* ===== SERVICIOS 2 ===== */
    .servicios2-section { border-bottom: 1px solid var(--border); }

    .servicios2-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .servicios2-col-text {
      padding: 3.5rem 3rem;
      background: var(--dark2);
    }

    .servicios2-col-text .servicio-item { font-size: 1.05rem; margin-bottom: 1.4rem; }

    .servicios2-col-image {
      background: var(--dark3);
      min-height: 320px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 1px solid var(--border);
    }

    .servicios2-col-image img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
    .servicios2-col-image .placeholder { font-size: 6rem; opacity: 0.15; }

    /* ===== CONTACTO ===== */
    .contacto-section {
      background: var(--dark2);
      padding: 4rem 2rem;
      border-bottom: 1px solid var(--border);
    }

    .contacto-inner {
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
    }

    .contacto-inner h2 {
      font-size: 2rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--secondary);
      margin-bottom: 0.5rem;
    }

    .contacto-inner > p {
      color: #aaa;
      font-style: italic;
      margin-bottom: 1rem;
    }

    .contacto-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-bottom: 3rem;
      margin-top: 2rem;
    }

    .contacto-card {
      background: var(--dark3);
      border: 1px solid var(--border);
      border-top: 3px solid var(--primary);
      padding: 2rem 1.5rem;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.25s;
      text-align: center;
    }

    .contacto-card:hover {
      background: #2a2a2a;
      transform: translateY(-4px);
      border-top-color: var(--secondary);
    }

    .contacto-card i { font-size: 2rem; color: var(--secondary); margin-bottom: 1rem; display: block; }
    .contacto-card h4 { font-size: 1rem; text-transform: uppercase; letter-spacing: 0.1em; color: white; margin-bottom: 0.5rem; }
    .contacto-card p { font-size: 0.9rem; color: #aaa; font-style: italic; }
    .contacto-card small { display: block; font-size: 0.75rem; color: var(--primary); margin-top: 0.4rem; }

    .redes-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 1rem;
    }

    .redes-sociales { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }
    .social-dropdown { position: relative; display: inline-block; }

    .social-menu {
      display: none;
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%);
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-top: 2px solid var(--primary);
      border-radius: 4px;
      padding: 8px;
      min-width: 200px;
      z-index: 100;
    }

    .social-dropdown.active .social-menu { display: block; }

    .social-option {
      display: block;
      padding: 8px 14px;
      color: #ccc;
      text-decoration: none;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      border-radius: 3px;
      margin: 3px 0;
      transition: all 0.2s;
    }

    .social-option:hover { background: var(--primary); color: white; }

    .social-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
